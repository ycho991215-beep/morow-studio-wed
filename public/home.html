      .then(function (b) {
        var a = new Audio(URL.createObjectURL(b));
        a.preload = 'auto'; a.volume = 0.95;
        voiceReady[i] = a;
      }).catch(function () {});
  });
})();
function stopVoice() {
  if (voiceRetry) { clearInterval(voiceRetry); voiceRetry = null; }
  if (curVoice) { try { curVoice.onended = null; curVoice.pause(); } catch (e) {} curVoice = null; }
}
function speakLine(i) {
  if (i < 0 || i > 2 || !voiceReady[i]) return false;
  stopVoice();
  var a = voiceReady[i];
  curVoice = a;
  try { a.currentTime = 0; } catch (e) {}
  a.onended = function () { if (onVoiceEnd) onVoiceEnd(i); };
  function tryPlay() {
    var p = a.play();
    if (p && p.then) {
      p.then(function () {
        hideVoiceHint(); pendingVoice = -1;
        if (voiceRetry) { clearInterval(voiceRetry); voiceRetry = null; }
      }).catch(function () { pendingVoice = i; showVoiceHint(); });
    }
  }
  tryPlay();
  // 自動重試：瀏覽器一允許出聲（任何互動後）立刻自己開口，不必等特定點擊
  voiceRetry = setInterval(function () {
    if (curVoice !== a) { clearInterval(voiceRetry); voiceRetry = null; return; }
    if (a.paused && pendingVoice === i) tryPlay();
  }, 600);
  return true;
}
function showVoiceHint() {
  var h = document.getElementById('voice-hint');
  if (h) h.classList.add('show');
}
function hideVoiceHint() {
  var h = document.getElementById('voice-hint');
  if (h) h.classList.remove('show');
}
// ── 場景音效（Eason 挑選的 mixkit 素材，2026-07-14）──
// 風切聲：低音量持續循環；划水聲：ORO 入場經過第 1、5、10 點時各播一聲
var windAudio = null, splashBase = null, windOn = false;
fetch(VOICE_DIR + 'wind.mp3?t=' + Date.now())
  .then(function (r) { if (!r.ok) throw 0; return r.blob(); })
  .then(function (b) {
    windAudio = new Audio(URL.createObjectURL(b));
    windAudio.loop = true; windAudio.volume = 0.35;   // 持續循環
    tryWind();
  }).catch(function () {});
fetch(VOICE_DIR + 'splash.mp3?t=' + Date.now())
  .then(function (r) { if (!r.ok) throw 0; return r.blob(); })
  .then(function (b) { splashBase = new Audio(URL.createObjectURL(b)); })
  .catch(function () {});
function tryWind() {
  if (windOn || !windAudio) return;
  var p = windAudio.play();
  if (p && p.then) p.then(function () { windOn = true; }).catch(function () {});
}
var windTimer = setInterval(function () {   // 瀏覽器一允許出聲就自動開始吹風
  tryWind();
  if (windOn) clearInterval(windTimer);
}, 800);
function playSplash() {
  if (!splashBase) return;
  var s = splashBase.cloneNode();
  s.volume = 1.0;
  var p = s.play(); if (p && p.catch) p.catch(function () {});
}
var splashPts = [0, 4, 9], splashDone = {};   // 第 1、5、10 個路徑點（索引 0/4/9）
window.__splashCheck = function (rawIdx) {
  for (var k = 0; k < splashPts.length; k++) {
    if (!splashDone[splashPts[k]] && rawIdx >= splashPts[k]) {
      splashDone[splashPts[k]] = true;
      playSplash();
    }
  }
};
// 首次互動：解鎖並補播語音＋風聲
['pointerdown', 'keydown'].forEach(function (ev) {
  document.addEventListener(ev, function () {
    hideVoiceHint();
    tryWind();
    if (pendingVoice >= 0) { var i = pendingVoice; pendingVoice = -1; speakLine(i); }
  }, { capture: true });
});

// ── 入場結束 → ORO 自動介紹網站功能（一次性，字幕與語音同步）──
// 節奏由語音主導：一句「唸完」才接下一句（不會再切斷長句）；
// 無聲（被瀏覽器擋或檔案缺失）時退回固定節奏走字幕。
var introDone = false;
function startIntro() {
  if (introDone) return;
  introDone = true;
  openBubble();
  var introMsgs = [
    '嗨，我是 ORO，叫我歐若也行 👋 歡迎來到莫羅工作室！',
    '我們用 AI 幫設備廠商做行銷 — 服務方案、作品集、AI 影片都在旁邊的藍色視窗環裡，轉轉看！',
    '或直接告訴我你的設備，馬上幫你規劃 🚀'
  ];
  var idx = 0, advTimer = null;
  function schedule(ms) { clearTimeout(advTimer); advTimer = setTimeout(next, ms); }
  onVoiceEnd = function (i) {
    if (i === idx - 1) { clearTimeout(advTimer); advTimer = setTimeout(next, 650); }
  };
  function next() {
    clearTimeout(advTimer);
    if (idx >= introMsgs.length) { onVoiceEnd = null; return; }
    var dot = showTyping();
    setTimeout(function () {
      dot.remove();
      addMsg(introMsgs[idx], 'oro');
      var spoke = speakLine(idx);         // 字幕出現同步開口
      var a = curVoice;
      idx++;
      if (!spoke) { schedule(3600); return; }
      // 800ms 後確認是否真的在播：在播→依音檔長度設保底；被擋→字幕照固定節奏走
      setTimeout(function () {
        if (a && !a.paused) {
          var d = (isFinite(a.duration) && a.duration > 0) ? a.duration : 7;
          schedule(d * 1000 + 1500);      // 保底（正常由 onVoiceEnd 提前接手）
        } else {
          schedule(3200);
        }
      }, 800);
    }, idx === 0 ? 600 : 900);
  }
  next();
}
oroPlaceholder.addEventListener('click', openBubble);
threeCanvas.addEventListener('click', function (e) {
  if (!modelReady || entranceState !== 'done') return;
  mouse2D.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(mouse2D, camera);
  if (raycaster.intersectObjects(oroGroup.children, true).length > 0) openBubble();
});
document.getElementById('close-bubble').addEventListener('click', function () {
  bubble.classList.remove('open');
  stopVoice();                          // 關閉對話窗同時停止語音
});

function addMsg(text, type) {
  var el = document.createElement('div');
  el.className = 'msg ' + type;
  el.innerHTML = text.replace(/\n/g, '<br>');
  msgsEl.appendChild(el);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function showTyping() {
  var el = document.createElement('div');
  el.className = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  msgsEl.appendChild(el);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return el;
}
function sendMsg() {
  var txt = chatIn.value.trim(); if (!txt) return;
  addMsg(txt, 'user'); chatIn.value = '';
  var dot = showTyping();
  setTimeout(function () {
    dot.remove();
    addMsg('收到您的需求！我們將為您的設備制定：\n\n• Mark 口播腳本（50秒精華版）\n• 5 組標題 + 30 個 Hashtag\n• YouTube / LinkedIn / Instagram 同步發布\n\n請問主要目標市場在哪裡？', 'oro');
  }, 1300);
}
document.getElementById('send-btn').addEventListener('click', sendMsg);
chatIn.addEventListener('keydown', function (e) { if (e.key === 'Enter') sendMsg(); });

// ── 動畫 ──
function animate() {
  requestAnimationFrame(animate);
  var t  = clock.getElapsedTime();
  var bs = oroGroup.userData.baseScale || 1;

  if (entranceState === 'sliding') {
    var trail = activeTrail();
    var lby   = oroGroup.userData.localBottomY || -1.1;

    // ── 第一幀初始化：計時 + 讓初始朝向對齊路徑第一段方向 ──
    if (entranceTStart < 0) {
      entranceTStart = t;
      // 計算起始方向，避免第一幀轉身跳動
      if (trail && trail.length >= 2 && window.waterTrailImgW) {
        var wpt0 = trailToWorldStable(trail[0].nx, trail[0].ny, window.waterTrailImgW, window.waterTrailImgH);
        var wpt1 = trailToWorldStable(trail[1].nx, trail[1].ny, window.waterTrailImgW, window.waterTrailImgH);
        if (wpt0 && wpt1) {
          var dx0 = wpt1.x - wpt0.x, dz0 = wpt1.z - wpt0.z;
          if (dx0*dx0 + dz0*dz0 > 0.0001) {
            entranceRotY = Math.atan2(-dx0, -dz0);
            oroGroup.rotation.y = entranceRotY;
          }
        }
      }
    }

    var SLIDE_DUR = (window.__calCfg && typeof window.__calCfg.simDur === 'number')
      ? window.__calCfg.simDur : 5.5;   // 入場時長：跟隨 calibrator 同步的「時長 s」
    // 手機路徑截短 → 時長等比縮短（維持相同步速）
    if (IS_MOB && window.__mobTrail && window.waterTrailPath && window.waterTrailPath.length > 1) {
      SLIDE_DUR *= window.__mobTrail.length / window.waterTrailPath.length;
    }
    var sp = Math.min((t - entranceTStart) / SLIDE_DUR, 1.0);
    var ep = easeInOutSine(sp);

    // 淡入：從閃電門中浮現
    if (!fadeDone) {
      var fade = Math.min(1, sp / FADE_PORTION);
      setOroOpacity(fade);
      if (fade >= 1) fadeDone = true;
    }

    if (trail && trail.length >= 2 && window.waterTrailImgW) {
      var rawIdx = ep * (trail.length - 1);
      if (window.__splashCheck) window.__splashCheck(rawIdx);   // 第1/5/10點划水聲
      var cp = crTrail(trail, rawIdx);   // Catmull-Rom 平滑取樣

      // ── 腳輪精確貼合水路：Raycaster 投影 (nx,ny) 到 z=nyToZOffset 平面 ──
      var wpt = trailToWorldStable(cp.nx, cp.ny, window.waterTrailImgW, window.waterTrailImgH);
      if (wpt) {
        // 先設尺寸（位置計算需要 oroGroup.scale.y）；含 scaleMul 鎖定點
        oroGroup.scale.setScalar(bs * trailKeyframedScale(ep));

        oroGroup.position.x = wpt.x;
        oroGroup.position.z = wpt.z;
        // 腳輪底緣 = wpt.y（水路世界 Y）
        // group.position.y = wpt.y - localBottomY * groupScale
        oroGroup.position.y = wpt.y - lby * oroGroup.scale.y;

        // ── 面朝前進方向（前看 0.4 路徑步長，曲線取樣）───────────
        var fIdx = Math.min(rawIdx + 0.4, trail.length - 1);
        var cp2  = crTrail(trail, fIdx);
        var wpt2 = trailToWorldStable(cp2.nx, cp2.ny, window.waterTrailImgW, window.waterTrailImgH);
        var rotTarget = entranceRotY;
        if (wpt2) {
          var dx = wpt2.x - wpt.x, dz = wpt2.z - wpt.z;
          if (dx*dx + dz*dz > 0.0001) {
            // Three.js 預設 forward=-Z，旋轉角 = atan2(-dx,-dz) 使物件朝 (dx,0,dz)
            var faceY = Math.atan2(-dx, -dz);
            var blend = Math.max(0, (sp - 0.8) / 0.2);  // 最後 20% 漸回 baseRotY
            rotTarget = faceY*(1-blend) + baseRotY*blend;
          }
        }
        // 套用 calibrator 匯出的鎖定角度 keyframe，結尾 15% 平滑回最終轉角
        rotTarget = trailKeyframedRot(ep, rotTarget);
        var blendEnd = Math.max(0, (sp - 0.85) / 0.15);
        rotTarget = rotTarget*(1-blendEnd) + baseRotY*blendEnd;
        entranceRotY += (rotTarget - entranceRotY) * 0.12;
        oroGroup.rotation.y = entranceRotY;
        currentRotY = entranceRotY;
      }
    } else {
      // 退回直線入場
      oroGroup.scale.setScalar(bs * trailKeyframedScale(ep));
      oroGroup.position.x = -2.5 + (centerPos.x - (-2.5)) * ep;
      oroGroup.position.y = centerPos.y;
      oroGroup.position.z = 0;
    }

    // ── 手機入場運鏡（全景平移）：背景圖/水面/M門/3D 鏡頭同步橫移，
    //    視窗中心跟著 ORO 到第 ORO_CAM_END_POINT 點 → 之後放手，畫面平滑移回最終構圖，ORO 自行入畫 ──
    if (IS_MOB && trail && trail.length > 2 && window.waterTrailImgW && window.__setScenePan) {
      var relProg = ep * (trail.length - 1);
      var followW = 1;
      if (relProg > ORO_CAM_END_POINT) {
        var relT = (relProg - ORO_CAM_END_POINT) / Math.max(0.5, (trail.length - 1) - ORO_CAM_END_POINT);
        followW = 1 - easeInOutSine(Math.min(1, relT));
      }
      // ORO 在「最終構圖」下的螢幕 x（cover 對齊數學，與 trailToWorld 相同）
      var __sw = innerWidth, __sh = innerHeight;
      var __sc = Math.max(__sw / window.waterTrailImgW, __sh / window.waterTrailImgH);
      var __oX = (__sw - window.waterTrailImgW * __sc) / 2;
      var __defX = cp.nx * window.waterTrailImgW * __sc + __oX;
      var __pan = Math.max(__oX, Math.min(-__oX, (__sw * 0.5 - __defX) * followW));
      window.__setScenePan(__pan);
      // 3D 鏡頭同步：followW=1 時 ORO 恰好在畫面中央，followW=0 回到最終構圖
      camera.position.x += ((oroGroup.position.x * followW) - camera.position.x) * 0.14;
      camera.updateMatrixWorld(true);
    }

    window.oroEnteringProgress = Math.sin(Math.PI * sp) * 0.88;

    updateFeetScreenPos();  // 腳輪底部 → 水波引擎滑水痕跡

    if (sp >= 1.0) {
      // 停在路徑終點（不跳位、不漂移），確保 done 狀態接續無跳動
      centerPos.x = oroGroup.position.x;
      centerPos.y = oroGroup.position.y;
      oroGroup.rotation.y = baseRotY;
      currentRotY = baseRotY;
      entranceState = 'done';
      floatT0 = t;                   // 懸浮相位歸零：從靜止位置緩緩盪起
      setOroOpacity(1); fadeDone = true;
      window.oroEnteringProgress = 0;
      // 手機：抵達中央後緩緩側移到球左側（像滑到舞台旁主持），把中央讓給展示球
      if (IS_MOB) {
        var __gr = new THREE.Raycaster();
        var __gv = new THREE.Vector3(0, oroGroup.position.y, oroGroup.position.z).project(camera);
        __gr.setFromCamera(new THREE.Vector2(ORO_MOBILE_FX * 2 - 1, __gv.y), camera);
        var __gt = (oroGroup.position.z - __gr.ray.origin.z) / __gr.ray.direction.z;
        window.__oroGlide = {
          fromX: oroGroup.position.x,
          toX:   __gr.ray.origin.x + __gt * __gr.ray.direction.x,
          fromY: centerPos.y,
          toY:   centerPos.y + ORO_MOBILE_RAISE,   // 側移同時稍微上浮
          t0:    t + 0.6,   // 停頓 0.6s 再側移，銜接自然
          dur:   1.5
        };
      }
      // 入場結束 → 光束閃爍點亮 → 橢圓圈 → 視窗展開 → ORO 自我介紹
      setTimeout(function () {
        if (window.__ringReveal) window.__ringReveal(function () { setTimeout(startIntro, 400); });
        else startIntro();
      }, 600);
    }
  }
  else if (entranceState === 'done') {
    // 手機：運鏡歸位（鏡頭與全景平移一起平滑收斂到最終構圖）
    if (IS_MOB) {
      if (Math.abs(camera.position.x) > 0.002) {
        camera.position.x *= 0.94;
        if (Math.abs(camera.position.x) < 0.002) camera.position.x = 0;
        camera.updateMatrixWorld(true);
      }
      if (window.__setScenePan && Math.abs(window.__scenePanX || 0) > 0.6) {
        window.__setScenePan(window.__scenePanX * 0.94);
      }
    }
    // 手機側移＋上浮：入場結束後滑到球左側（easeInOutSine，划水感）
    if (window.__oroGlide) {
      var __g = window.__oroGlide;
      if (t >= __g.t0) {
        var __gp = easeInOutSine(Math.min(1, (t - __g.t0) / __g.dur));
        centerPos.x = __g.fromX + (__g.toX - __g.fromX) * __gp;
        centerPos.y = __g.fromY + (__g.toY - __g.fromY) * __gp;
        oroGroup.position.x = centerPos.x;
        if (__gp >= 1) window.__oroGlide = null;
      }
    }
    // 停在路徑終點懸浮：sin 相位歸零 + 前 2.5 秒振幅漸增 → 銜接無跳動
    var ft = t - floatT0;
    oroGroup.position.y = centerPos.y +
      Math.sin(ft * FLOAT_SPEED) * FLOAT_AMP * Math.min(1, ft / 2.5);
    currentRotY += (targetRotY - currentRotY) * 0.05;
    currentRotX += (targetRotX - currentRotX) * 0.05;
    oroGroup.rotation.y = currentRotY;
    oroGroup.rotation.x = currentRotX;
    updateFeetScreenPos();  // 待機漂浮時持續更新腳底位置（輕漣漪）
  }

  if (modelReady) {
    eyeGlow.intensity = 0.18 + Math.sin(t * 2.0) * 0.10;
    eyeGlow.color.setHSL(0.52 + Math.sin(t * 0.3) * 0.02, 1, 0.6);
  }

  if (window.__ringTick) window.__ringTick(t);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', function () {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

})();
</script>
</body>
